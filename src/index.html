<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="나의 성향과 생활환경에 가까운 강아지 품종을 찾아보는 퀴즈">
  <title>멍BTI — AI 성향 기반 견종 추천</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <img class="hero-art" src="/윗그림.png" alt="Meong bti 로고와 여러 강아지 얼굴 그림. 테스트로 나와 맞을 반려견을 찾아드려요!">
    </header>

    <section id="quiz-panel" class="panel">
      <div class="panel-heading"><div><h2>Question</h2></div></div>
      <form id="quiz-form">
        <div id="quiz"></div>
        <section class="subjective-panel" aria-labelledby="subjective-heading">
          <div class="context-pattern" aria-hidden="true"><span>●</span><span>◆</span><span>●</span></div>
          <div class="panel-heading context-heading"><div><p class="eyebrow">YOUR CONTEXT</p><h3 id="subjective-heading">내 상황을 더 알려주세요</h3></div><img class="context-dog" src="/내 상황.jpg" alt="" aria-hidden="true"></div>
          <div class="subjective-grid">
            <label><span class="field-title">더 정확한 추천을 위해 참고했으면 하는 점</span><span class="field-help">짖음, 털, 건강, 훈련, 생활시간 등 자유롭게 적어주세요.</span><textarea id="user-context" data-subjective="context" rows="5" maxlength="1000" placeholder="예: 평일에는 집을 오래 비우고, 주말에는 함께 등산하고 싶어요. 짖음과 털 빠짐이 걱정돼요."></textarea></label>
          </div>
          <p id="subjective-validation" class="validation" role="alert" hidden></p>
          <div class="subjective-actions"><span id="agent-status" role="status" aria-live="polite"></span></div>
        </section>
        <p id="validation" class="validation" hidden></p>
        <button id="recommend-submit" class="primary-button" type="submit">내 견종 추천받기 <span>→</span></button>
      </form>
    </section>

    <section id="final-panel" class="panel final-panel" hidden aria-labelledby="final-heading">
      <div class="panel-heading"><div><p class="eyebrow">FINAL REVIEW</p><h2 id="final-heading" tabindex="-1">최종 추천</h2></div></div>
      <h3 id="final-breed"></h3>
      <p id="final-summary" class="final-summary"></p>
      <div class="final-columns">
        <div><strong>추천 근거</strong><ul id="final-reasons"></ul></div>
        <div><strong>확인할 점</strong><ul id="final-cautions"></ul></div>
      </div>
      <div id="final-source-block"><strong>검색 출처</strong><ul id="final-sources"></ul></div>
      <p id="final-fallback" class="individual-notice" hidden>LLM 또는 웹 검색을 사용할 수 없어 결정적 후보를 표시했습니다.</p>
      <p class="individual-notice">LLM 판단과 품종 정보는 참고용입니다. 실제 개체의 성격과 건강 상태를 확인하세요.</p>
      <button id="restart" class="secondary-button" type="button">다시 테스트하기</button>
    </section>

    <footer>멍BTI는 입양 적합성이나 품종의 우열을 판정하지 않습니다. 책임 있는 반려생활을 위해 가족과 충분히 상의해 주세요.</footer>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
