<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">LUNCH PICKER</p>
      <h1>오늘 점심, 뭐 먹지?</h1>
      <p class="intro">지금 먹고 싶은 방식에 맞춰 점심을 골라드릴게요.</p>
    </header>

    <form id="recommendation-form" novalidate>
      <fieldset>
        <legend>추천 유형</legend>
        <label class="choice"><input type="radio" name="mode" value="idea" checked> 일반 메뉴 아이디어</label>
        <label class="choice"><input type="radio" name="mode" value="restaurant"> 주변 식당 메뉴</label>
      </fieldset>

      <div id="location-fields" class="location-fields" hidden>
        <label for="area">동네 또는 주소 <span class="hint">(위치 권한을 거부한 경우)</span></label>
        <input id="area" name="area" autocomplete="street-address" placeholder="예: 성수동">
        <p id="location-status" class="hint" role="status">주변 식당을 찾으려면 위치를 허용하거나 동네를 입력하세요.</p>
      </div>

      <div class="filters">
        <label for="category">음식 종류 <span class="hint">선택</span></label>
        <input id="category" name="category" placeholder="예: 한식">
        <label for="max-price">최대 예산 <span class="hint">원, 선택</span></label>
        <input id="max-price" name="maxPrice" type="number" min="0" inputmode="numeric" placeholder="10000">
        <label for="max-distance">최대 거리 <span class="hint">km, 식당 모드만</span></label>
        <input id="max-distance" name="maxDistance" type="number" min="0" step="0.1" inputmode="decimal" placeholder="2">
        <label for="diet">식단 제한 <span class="hint">쉼표로 구분, 선택</span></label>
        <input id="diet" name="diet" placeholder="예: 채식, 고단백">
      </div>

      <div class="actions">
        <button type="submit">점심 추천받기</button>
        <button id="clear-filters" type="button" class="secondary">조건 지우기</button>
      </div>
    </form>

    <section id="status" class="status" role="status" aria-live="polite"></section>
    <section id="results" aria-labelledby="results-title">
      <h2 id="results-title" hidden>추천 결과</h2>
      <div id="result-list" class="result-list"></div>
      <button id="refresh" type="button" class="secondary" hidden>다른 메뉴 추천받기</button>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
