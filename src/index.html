<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="나의 성향과 생활환경에 가까운 강아지 품종을 찾아보는 퀴즈">
  <title>멍BTI — AI 성향 기반 견종 추천</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="brand">멍<span>BTI</span></div>
      <p class="eyebrow">AI 성향 기반 견종 추천</p>
      <h1>나와 잘 맞을 강아지는<br><em>어떤 친구</em>일까요?</h1>
      <p class="hero-copy">나의 생활 리듬과 성향을 바탕으로<br>40종의 견종 중 가장 가까운 세 친구를 찾아드려요.</p>
    </header>

    <section id="quiz-panel" class="panel">
      <div class="panel-heading">
        <div><p class="eyebrow">QUIZ</p><h2>나를 알아가는 시간</h2></div>
        <span class="question-count">13 QUESTIONS</span>
      </div>
      <form id="quiz-form">
        <div id="quiz"></div>
        <p id="validation" class="validation" hidden></p>
        <button class="primary-button" type="submit">내 견종 추천받기 <span>→</span></button>
      </form>
    </section>

    <section id="results-panel" class="panel results-panel" hidden>
      <div class="panel-heading"><div><p class="eyebrow">YOUR MATCH</p><h2>당신과 가까운 친구들</h2></div></div>
      <p class="result-intro">설문 답변과 품종별 생활 특성 태그를 비교한 결과예요.<br>추천은 참고용이며 실제 개체의 성격과 건강은 다를 수 있어요.</p>
      <div id="results-list"></div>
      <button id="restart" class="secondary-button" type="button">다시 테스트하기</button>
    </section>

    <footer>멍BTI는 입양 적합성이나 품종의 우열을 판정하지 않습니다. 책임 있는 반려생활을 위해 가족과 충분히 상의해 주세요.</footer>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
