<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강아지 양육 시뮬레이션</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">입양 전 준비 체험</p>
      <h1>강아지를 돌보는 하루를 미리 경험해 보세요</h1>
      <p>이 결과는 입양 적합성을 판정하지 않습니다. 반복되는 돌봄과 내 생활의 균형을 돌아보는 도구입니다.</p>
    </header>

    <section id="start-panel" class="card" aria-labelledby="start-title">
      <h2 id="start-title">시뮬레이션 시작</h2>
      <p>예측하기 어려운 시간에 산책, 밥, 물, 배변 처리, 상태 확인 요청이 도착합니다.</p>
      <button id="start-button" type="button">시작하기</button>
      <button id="notify" type="button" class="secondary">시스템 알림 설정</button>
    </section>

    <section id="session" class="card" hidden aria-labelledby="session-title">
      <div class="section-heading">
        <h2 id="session-title">오늘의 돌봄 요청</h2>
        <p id="summary" aria-live="polite"></p>
      </div>
      <div class="actions">
        <button id="pause" type="button">잠시 멈추기</button>
        <button id="resume" type="button" class="secondary">다시 시작</button>
        <button id="complete-session" type="button" class="secondary">체험 종료</button>
        <button id="abandon" type="button" class="secondary">기록 초기화</button>
      </div>
      <p id="message" class="message" role="status" aria-live="polite"></p>
      <ul id="requests" aria-label="돌봄 요청 목록"></ul>
    </section>

    <section id="reflection" class="card" hidden aria-labelledby="reflection-title">
      <h2 id="reflection-title">체험 돌아보기</h2>
      <p id="reflection-content"></p>
      <p>실제 입양을 결정하기 전에는 시간, 생활환경, 비용, 가족의 역할과 장기 책임을 별도로 확인하세요.</p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
